[artifacts]
path = "artifacts"

[network]
reserve-ports = 1

[[systemd-unit]]
[systemd-unit.template]
builtin = "webapp.service"
vars = {
  exec_start = "python3 {{ APP_ACTIVE_ARTIFACTS_DIR }}/main.py"
}

[caddyfile.template]
builtin = "reverse-proxy"
vars = {
  domains = ["python-site.example.com"]
}
