[artifacts]
path = "artifacts"

[network]
reserve-ports = 1

[[systemd-unit]]
[systemd-unit.template]
builtin = "webapp.service"
vars = {
  exec_start = "python3 {{ vade.app.artifacts.active }}/main.py",
  extra_env_vars = {
    "MY_ENV_VAR" = "42"
  }
}

[caddyfile.template]
builtin = "reverse-proxy"
vars = {
  domains = ["python-site.example.com"]
}
