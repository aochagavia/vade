[artifacts]
path = "artifacts"

[network]
reserve-ports = 1

[[systemd-unit]]
[systemd-unit.template]
builtin = "webapp.service"
vars = {
  exec_start = "{{ vade.app.artifacts.active }}/goatcounter serve -listen :{{ vade.app.network.port }}"
}

[caddyfile.template]
builtin = "reverse-proxy"
vars = {
  domains = ["goats.example.com"]
}
